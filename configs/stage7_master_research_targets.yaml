nemotron_discussion_topics:
  high_priority:
    - topic_id: 704491
      title: "From Solving Overfitting to Fighting Non-Determinism"
      reason: "training/evaluation variance, seed instability, category balancing, Muon mention"
      required_read: true
      extracted_actions:
        - "record seed and run-to-run variance"
        - "do not interpret a single 0.86/0.85 delta as definitive"
        - "evaluate stability of adapter family, not only mean score"
    - topic_id: 703240
      title: "From 8% to 71% on Cryptarithm Tasks, But Score Still Stuck at 0.86"
      reason: "cryptarithm gains can regress bit/gravity/numeral/unit categories"
      required_read: true
      extracted_actions:
        - "track category tradeoff before data-mix change"
        - "avoid single-category overtraining"
        - "preserve saturated categories while adding weak-category data"
    - topic_id: 687961
      title: "Training Nemotron-3-Nano-30B-A3B-BF16 with rank 32 LoRA on length 8192 sequences"
      reason: "memory/throughput constraints for RTX Pro 6000 and sequence length 8192"
      required_read: true
      extracted_actions:
        - "keep realistic expectations for full training runtime"
        - "record microbatch, VRAM, fused CE, and FA2/Unsloth constraints"
    - topic_id: 698293
      title: "97.2% Gold-Conditioned Symbolic Solver Exposing Digit Mappings and Operators"
      reason: "symbolic/equation solver code and oracle-vs-trainable distinction"
      required_read: true
      extracted_actions:
        - "use solver outputs for data generation/analysis only"
        - "do not confuse gold-conditioned oracle with deployable inference"
    - topic_id: 681745
      title: "How to Get Started + Nemotron Model Reasoning Challenge Resources"
      reason: "official resources, metric/eval, NVIDIA repos, data designer/curator/RL"
      required_read: true
      extracted_actions:
        - "review official metric and current evaluation page settings"
        - "prefer official NVIDIA repos/docs for infrastructure decisions"
    - topic_id: 704473
      title: "Extending Model Merging to LoRa Ensembling"
      reason: "LoRA ensembling/fusion experiments"
      required_read: true
      extracted_actions:
        - "compare any new fusion to this discussion before implementation"
    - topic_id: 704595
      title: "0.89 and cryptarithm puzzle hypothesis"
      reason: "top score may require cryptarithm breakthrough"
      required_read: true
      extracted_actions:
        - "separate evidence from speculation before changing data mix"
    - topic_id: 702447
      title: "How to break 0.86 ceiling"
      reason: "community discussion around plateau breaking"
      required_read: true
      extracted_actions:
        - "extract concrete mechanisms only"
    - topic_id: 701761
